<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#ffffff"/>

  <text x="400" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#2c2c2a">Le cycle voix-atelier</text>
  <text x="400" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#5f5e5a" font-style="italic">On parle, on monte, on reparle, on livre.</text>

  <rect x="120" y="150" width="220" height="90" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="230" y="185" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#3c3489">1. Le brut</text>
  <text x="230" y="213" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="13" fill="#3c3489">Saisie sans filtre</text>

  <rect x="460" y="150" width="220" height="90" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="570" y="185" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#0f6e56">2. La tension</text>
  <text x="570" y="213" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="13" fill="#0f6e56">Montée conceptuelle</text>

  <rect x="460" y="360" width="220" height="90" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="570" y="395" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#3c3489">3. La reprise</text>
  <text x="570" y="423" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="13" fill="#3c3489">Voix informée</text>

  <rect x="120" y="360" width="220" height="90" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="230" y="395" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#444441">4. La pièce</text>
  <text x="230" y="423" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="13" fill="#444441">Production située</text>

  <line x1="342" y1="195" x2="458" y2="195" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="242" x2="570" y2="358" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="458" y1="405" x2="342" y2="405" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 230 358 L 230 242" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <text x="230" y="300" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="13" fill="#5f5e5a" font-style="italic">bouclage</text>

  <rect x="350" y="280" width="100" height="40" rx="6" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="400" y="295" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="11" fill="#5f5e5a">règle</text>
  <text x="400" y="310" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, sans-serif" font-size="11" fill="#5f5e5a">d'étanchéité</text>

  <text x="400" y="510" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#888780">Produire avec l'IA sans perdre sa voix. Méthode itérative en quatre temps.</text>
  <text x="400" y="560" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#888780">Rochane Kherbouche · voix-atelier.rochane.fr · CC BY-SA 4.0</text>
</svg>
